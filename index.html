<html lang="en">
<head>

<header><a class="brand" href="https://www.foxitire.com/"><img src="https://www.foxitire.com/images/foxi_logo.svg" alt="FOXI"><b>FOXI</b></a><button class="menu" type="button"><i></i><i></i><i></i></button></header>
